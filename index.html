<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEVA</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <h2 class="main_title">CINEVA</h2>

        <nav>
            <ul>
                <li><a href="#">Головна</a></li>
                <li><a href="#">Фільми</a></li>
                <li><a href="#">Контакти</a></li>
            </ul>
        </nav>
    </header>

    <main class="catalog">

        <section class="hero">
            <h1 class="hero_title">Найкращий Каталог Фільмів</h1>
            <strong class="strong">Відкрий світ кіно з добірками, створеними спеціально для тебе.</strong>
            <button class="button">Дізнатись більше</button>
        </section>

        <div class="buttons">
            <button class="button_2">Всі</button>
            <button class="button_2">Жахи</button>
            <button class="button_2">Фантастика</button>
            <button class="button_2">Наукова Фантастика</button>
            <button class="button_2">Пригоди</button>
            <button class="button_2">Комедія</button>
            <button class="button_2">Боєвик</button>
        </div>

        <div class="catalog_grid">

            <div class="card">
                <div class="card_poster">
                    <img src="./Images/Stranger_Things.webp">

                    <div class="bublik">
                        <button class="btn-open" data-modal-open>Більше</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card_poster">
                    <img src="./Images/Harry_Potter.webp">
                </div>
            </div>

            <div class="card">
                <div class="card_poster">
                    <img src="./Images/Dumb_n_Dumber.webp">
                </div>
            </div>

            <div class="card">
                <div class="card_poster">
                    <img src="./Images/Bad_Boys.webp">
                </div>
            </div>

            <div class="card">
                <div class="card_poster">
                    <img src="./Images/Hail_Mary.webp">
                </div>
            </div>

            <div class="card">
                <div class="card_poster">
                    <img src="./Images/Scream.webp">
                </div>
            </div>

        </div>
    </main>

    <div class="backdrop" data-modal>
        <div class="modal">
            <button class="btn-close" data-modal-close>✕</button>

            <div>

            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
